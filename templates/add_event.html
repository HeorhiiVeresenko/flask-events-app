<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create new event</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='add_event.css') }}">
</head>
<body>
    <div class="container_event">
        <div class="card_event">
            <h1 class="title_event">Create new event</h1>
    
            <form action="/add-event" method="POST" class="form_event">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="title" required class="input_event">
                </div>
    
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="5" required class="input_event"></textarea>
                </div>
    
                <div class="form-group">
                    <label>Дата та час</label>
                    <input type="datetime-local" name="event_date" required class="input_event">
                </div>
    
                <button type="submit" class="btn_event">Save</button>
            </form>
    
            <a href="{{ url_for('index') }}" class="link_event">Return</a>
        </div>
    </div>
</body>
</html>
