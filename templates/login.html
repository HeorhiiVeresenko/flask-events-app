<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

    <div class="container_login">
        <div class="card_login">
            <h2 class="title_login">Login</h2>
    
            <form method="post" class="form_login">
                <input type="text" name="name" placeholder="Name" required class="input_login">
                <input type="password" name="password" placeholder="Password" required class="input_login">
    
                <button type="submit" class="btn_login">Login</button>
            </form>
    
            <p class="text_login">
                Don't have an account?
                <a href="/register" class="link_login">Register</a>
            </p>
        </div>
    </div>

</body>
</html>
